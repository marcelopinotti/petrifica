server:
  port: 8081

spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: petrifica-loan
      auto-index-creation: true


  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://localhost:8080/realms/petrifica


  kafka:
    uri: localhost:9092
    topic: loan-topic

